name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # PR to main: ensure package.json version was bumped
  # ──────────────────────────────────────────────
  version-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        run: |
          TARGET_VERSION=$(git show origin/main:package.json | jq -r .version)
          SOURCE_VERSION=$(jq -r .version package.json)
          echo "Target (main) version: ${TARGET_VERSION}"
          echo "Source (PR branch) version: ${SOURCE_VERSION}"
          HIGHEST=$(printf '%s\n' "$SOURCE_VERSION" "$TARGET_VERSION" | sort -V | tail -n1)
          if [ "$HIGHEST" != "$SOURCE_VERSION" ] || [ "$SOURCE_VERSION" = "$TARGET_VERSION" ]; then
            echo "ERROR: Version ${SOURCE_VERSION} must be greater than ${TARGET_VERSION}. Bump the version in package.json."
            exit 1
          fi
          echo "OK: ${SOURCE_VERSION} > ${TARGET_VERSION}"

  # ──────────────────────────────────────────────
  # Build on every push and PR
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run compile
      - run: npx @vscode/vsce package --no-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
          retention-days: 7

  # ──────────────────────────────────────────────
  # Publish to VS Code Marketplace on merge to main
  # ──────────────────────────────────────────────
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish to Marketplace
        run: npx @vscode/vsce publish --packagePath claude-workspace-*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  # ──────────────────────────────────────────────
  # Create GitHub Release with tag on merge to main
  # ──────────────────────────────────────────────
  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=v$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: "*.vsix"
