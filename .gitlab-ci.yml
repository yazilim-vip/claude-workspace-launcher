stages:
  - build
  - publish

build:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
    - npm run compile
    - npx @vscode/vsce package --no-dependencies
  artifacts:
    paths:
      - "*.vsix"
    expire_in: 1 week

publish:
  stage: publish
  image: node:20-alpine
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - build
  script:
    - npx @vscode/vsce publish --pat "$VSCE_PAT" --packagePath claude-workspace-*.vsix
