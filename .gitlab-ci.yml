stages:
  - check
  - build
  - release
  - publish

version-check:
  stage: check
  image: alpine:3.20
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache git jq
  script:
    - |
      git fetch origin "$CI_DEFAULT_BRANCH"
      TARGET_VERSION=$(git show "origin/${CI_DEFAULT_BRANCH}:package.json" | jq -r .version)
      SOURCE_VERSION=$(jq -r .version package.json)
      echo "Target (${CI_DEFAULT_BRANCH}) version: ${TARGET_VERSION}"
      echo "Source (MR branch) version: ${SOURCE_VERSION}"
      HIGHEST=$(printf '%s\n' "$SOURCE_VERSION" "$TARGET_VERSION" | sort -V | tail -n1)
      if [ "$HIGHEST" != "$SOURCE_VERSION" ] || [ "$SOURCE_VERSION" = "$TARGET_VERSION" ]; then
        echo "ERROR: Version ${SOURCE_VERSION} must be greater than ${TARGET_VERSION}. Bump the version in package.json."
        exit 1
      fi
      echo "OK: ${SOURCE_VERSION} > ${TARGET_VERSION}"

build:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
    - npm run compile
    - npx @vscode/vsce package --no-dependencies
  artifacts:
    paths:
      - "*.vsix"
    expire_in: 1 week

release:
  stage: release
  image: alpine:3.20
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache git jq
  script:
    - |
      VERSION=$(jq -r .version package.json)
      TAG="v${VERSION}"
      echo "Creating tag ${TAG}"
      git tag "$TAG" "$CI_COMMIT_SHA"
      git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$TAG"

publish:
  stage: publish
  image: node:20-alpine
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs:
    - build
  script:
    - npx @vscode/vsce publish --pat "$VSCE_PAT" --packagePath claude-workspace-*.vsix
